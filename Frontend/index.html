<!--
HTML-kommentar: Strukturöversikt
1. Head
2. Body
   2.1 Header
   2.2 Main
       2.2.1 Hero-sektion
   2.3 Footer
3. Script-sektion
-->

<!doctype html>
<html lang="sv">
    <head>
        <!-- 1. Head -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Juice&Co</title>

        <!-- Lokal CSS -->
        <link rel="stylesheet" href="assets/css/nav-footer.css" />
        <link rel="stylesheet" href="assets/css/index.css" />

        <!-- Bootstrap och ikoner -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        />
    </head>

    <body>
        <!-- 2.1 Header -->
        <header>
            <div id="header"></div>
        </header>

        <!-- 2.2 Main -->
        <main>
            <!-- 2.2.1 Hero-sektion -->
            <section class="hero">
                <div class="container hero-container">
                    <!-- Textinnehåll -->
                    <div class="hero-content">
                        <h1 class="hero-title">
                            Färsk Juice<br />
                            Skapad för Energi
                        </h1>

                        <p class="hero-text">
                            Naturliga ingredienser, full av smak och energi.
                            Perfekt start på dagen eller efter träningen.
                        </p>

                        <a
                            href="/Frontend/pages/products.html"
                            class="btn btn-shop-primary hero-btn"
                        >
                            Shoppa nu
                        </a>
                    </div>

                    <!-- Bild -->
                    <div class="hero-image">
                        <img
                            class="hero-image"
                            src="assets/media/hero.png"
                            alt="Juice bottle"
                        />
                    </div>
                </div>
            </section>
        </main>

        <!-- 2.3 Footer -->
        <footer>
            <div id="footer"></div>
        </footer>

        <!-- 3. Script-sektion -->
        <!-- Bootstrap -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Egna script -->
        <script src="assets/js/components.js"></script>
        <script src="assets/js/navbar.js"></script>
        <script src="assets/js/cart.js"></script>
    </body>
</html>
