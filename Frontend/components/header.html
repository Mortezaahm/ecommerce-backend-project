<!--
HTML-kommentar: Strukturöversikt
1. Head
2. Body
   2.1 Header
       2.1.1 Konto-dropdown
       2.1.2 Varukorg-dropdown
       2.1.3 Huvudmeny med länkar och produkter
-->

<head>
    <!-- 1. Head -->
    <link rel="stylesheet" href="/assets/css/nav-footer.css" />

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
</head>

<header>
    <!-- 2.1 Header -->
    <nav class="navbar navbar-expand-lg sticky-top shop-navbar">
        <div class="container-fluid px-4 px-lg-5 mobile-nav-wrap">
            <!-- Mobil menyknapp -->
            <button
                class="navbar-toggler border-0"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar"
                aria-label="Öppna meny"
            >
                <i class="bi bi-list"></i>
            </button>

            <!-- Logo -->
            <a
                class="navbar-brand fw-bold fs-4 mobile-centered-logo"
                id="logo"
                href="/"
            >
                Juice&Co
            </a>

            <div class="d-flex align-items-center navbar-actions mobile-icons">
                <!-- 2.1.1 Konto-dropdown -->
                <div class="dropdown hover-dropdown account-dropdown">
                    <button
                        class="btn account-trigger"
                        type="button"
                        id="accountDropdown"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        aria-label="Mitt konto"
                    >
                        <i class="bi bi-person"></i>
                    </button>

                    <div
                        class="dropdown-menu account-menu"
                        aria-labelledby="accountDropdown"
                    >
                        <div class="account-menu-inner">
                            <a
                                href="/pages/login.html"
                                class="account-login-btn"
                                id="account-main-link"
                            >
                                Logga in
                            </a>

                            <div class="account-register-row" id="register-row">
                                <a
                                    href="/pages/register.html"
                                    class="account-register-link"
                                >
                                    Registrera
                                </a>
                            </div>

                            <hr />

                            <div class="account-guest-links">
                                <a
                                    class="dropdown-item"
                                    id="orders-link"
                                    href="/pages/login.html"
                                >
                                    Mina beställningar
                                </a>
                                <a
                                    class="dropdown-item"
                                    id="reviews-link"
                                    href="/pages/login.html"
                                >
                                    Mina recensioner
                                </a>
                                <a
                                    class="dropdown-item"
                                    href="/pages/contact-about-us.html"
                                >
                                    Hjälp & kontakt
                                </a>
                                <a
                                    id="logout-btn"
                                    class="dropdown-item d-none"
                                    href="#"
                                >
                                    Logga ut
                                </a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2.1.2 Varukorg-dropdown -->
                <div class="dropdown hover-dropdown cart-wrapper">
                    <button
                        class="btn cart-trigger position-relative"
                        type="button"
                        id="cartDropdown"
                        data-bs-toggle="dropdown"
                        data-bs-auto-close="outside"
                        aria-expanded="false"
                        aria-label="Varukorg"
                    >
                        <i class="bi bi-cart3"></i>
                        <span
                            class="position-absolute top-50 start-100 translate-middle badge rounded-pill bg-black cart-btn-badge"
                        >
                            0
                        </span>
                    </button>

                    <div
                        class="dropdown-menu cart-dropdown"
                        aria-labelledby="cartDropdown"
                    >
                        <div class="cart-menu-inner">
                            <div id="cartItems">
                                <p class="mb-3">Din varukorg är tom.</p>
                            </div>
                            <hr />
                            <div class="d-flex justify-content-between mb-3">
                                <span class="fw-semibold">Summa</span>
                                <span class="fw-bold" id="cartTotal">0 kr</span>
                            </div>
                            <div class="d-grid gap-2">
                                <a
                                    href="/pages/cart.html"
                                    class="btn btn-outline-secondary"
                                >
                                    Till kundvagn
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 2.1.3 Huvudmeny med länkar och produkter -->
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-lg-5 gap-lg-2 mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Hem</a>
                    </li>

                    <li class="nav-item dropdown position-static">
                        <a
                            class="nav-link dropdown-toggle"
                            href="#"
                            id="productsDropdown"
                            role="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                        >
                            Produkter
                        </a>

                        <div
                            class="dropdown-menu mega-menu w-100 mt-0 border-0"
                            aria-labelledby="productsDropdown"
                        >
                            <div class="container py-4">
                                <div class="row g-4 justify-content-center">
                                    <div class="col-lg-12">
                                        <div
                                            class="row row-cols-2 row-cols-md-3 row-cols-lg-6 g-3"
                                            id="navbar-products-list"
                                        ></div>

                                        <div class="mt-4 text-center">
                                            <a
                                                href="/pages/products.html"
                                                class="btn btn-shop-primary"
                                            >
                                                Visa alla produkter
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/pages/contact-about-us.html"
                            >Om oss</a
                        >
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/pages/contact-about-us.html"
                            >Kontakt</a
                        >
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/components.js"></script>
<script src="/assets/js/navbar.js"></script>
<script src="/assets/js/cart.js"></script>
