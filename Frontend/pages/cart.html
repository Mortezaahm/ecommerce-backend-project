<!doctype html>
<html lang="sv">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Juice&Co - Kundvagn</title>

        <link rel="stylesheet" href="../assets/css/cart.css" />
    </head>

    <body>
        <header>
            <div id="header"></div>
        </header>

        <main class="cart-page">
            <section class="cart-page-header">
                <h1>Din kundvagn</h1>
                <p>Här ser du produkterna du har lagt till.</p>
            </section>

            <section class="cart-layout">
                <div class="cart-left">
                    <div id="cartPageItems" class="cart-page-items">
                        <p>Laddar kundvagn...</p>
                    </div>
                </div>

                <aside class="cart-summary">
                    <h2>Orderöversikt</h2>

                    <div class="summary-row">
                        <span>Antal produkter</span>
                        <span id="cartPageCount">0</span>
                    </div>

                    <div class="summary-row summary-total">
                        <span>Totalt</span>
                        <span id="cartPageTotal">0 kr</span>
                    </div>

                    <div class="summary-actions">
                        <a
                            href="/pages/products.html"
                            class="btn btn-outline-secondary"
                        >
                            Fortsätt handla
                        </a>

                        <button type="button" class="btn btn-dark">
                            Gå till kassan
                        </button>
                    </div>
                </aside>
            </section>
        </main>

        <footer>
            <div id="footer"></div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../assets/js/components.js"></script>
        <script src="../assets/js/navbar.js"></script>
        <script src="../assets/js/cart.js"></script>
    </body>
</html>
