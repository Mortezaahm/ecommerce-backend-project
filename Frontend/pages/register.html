<!--
HTML-kommentar: Strukturöversikt
1. Head
2. Body
   2.1 Header
   2.2 Main
       2.2.1 Registreringsformulär
   2.3 Footer
-->

<!doctype html>
<html lang="sv">
    <head>
        <!-- 1. Head -->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="/assets/css/auth.css" />
        <title>Juice&Co - Register</title>
    </head>

    <body>
        <!-- 2.1 Header -->
        <header>
            <div id="header"></div>
        </header>

        <!-- 2.2 Main -->
        <main class="auth-page">
            <!-- 2.2.1 Registreringsformulär -->
            <div class="auth-wrapper">
                <form id="register-form" class="auth-form">
                    <h2 class="auth-title">Registrera dig</h2>

                    <input
                        id="name"
                        class="auth-input"
                        type="text"
                        placeholder="Namn*"
                        required
                    />
                    <input
                        id="email"
                        class="auth-input"
                        type="email"
                        placeholder="Email*"
                        required
                    />
                    <input
                        id="confirm-email"
                        class="auth-input"
                        type="email"
                        placeholder="Bekräfta Email*"
                        required
                    />
                    <input
                        id="password"
                        class="auth-input"
                        type="password"
                        placeholder="Lösenord*"
                        required
                    />
                    <input
                        id="confirm-password"
                        class="auth-input"
                        type="password"
                        placeholder="Bekräfta Lösenord*"
                        required
                    />

                    <button class="auth-button" type="submit">
                        Registrera dig
                    </button>

                    <p class="auth-text">
                        Redan medlem?
                        <a class="auth-link" href="/pages/login.html">
                            Logga in!
                        </a>
                    </p>
                </form>
            </div>
            <p id="register-error" class="text-danger mt-2"></p>
        </main>

        <!-- 2.3 Footer -->
        <footer>
            <div id="footer"></div>
        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/assets/js/components.js"></script>
        <script src="/assets/js/navbar.js"></script>
        <script src="/assets/js/cart.js"></script>
        <script src="/assets/js/register.js"></script>
    </body>
</html>
