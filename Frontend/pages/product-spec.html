<!--
HTML-kommentar: Strukturöversikt
1. Head innehåller metadata och länkade stilmallar
2. Body innehåller sidans huvudstruktur

   2.2 Main där sidans innehåll visas
   2.3 Footer där sidfoten laddas in
3. Script-sektion för externa bibliotek och egna JavaScript-filer
-->

<!doctype html>
<html lang="sv">

        <meta charset="UTF-8" />

    </head>

    <body>
        <!-- Header där navbaren laddas in -->
        <header>
            <div id="header"></div>
        </header>

        <!-- Huvudinnehåll för sidan -->
        <main></main>

        <!-- Footer laddas in här -->
        <footer>
            <div id="footer"></div>
        </footer>

        <!-- Script -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../assets/js/components.js"></script>
        <script src="../assets/js/navbar.js"></script>
        <script src="../assets/js/cart.js"></script>
    </body>
</html>
