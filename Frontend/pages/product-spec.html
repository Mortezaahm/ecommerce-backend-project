<!--
HTML-kommentar: Strukturöversikt
1. Head innehåller metadata och länkade stilmallar
2. Body innehåller sidans huvudstruktur
   2.1 Header där navigation laddas in
   2.2 Main där sidans innehåll visas
   2.3 Footer där sidfoten laddas in
3. Script-sektion för externa bibliotek och egna JavaScript-filer
-->

<!doctype html>
<html lang="sv">
  <head>
    <!-- Metadata och sidtitel -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../assets/css/product-spec.css" />
    <title>Juice&Co - Product Spec</title>
  </head>

  <body>
    <!-- Header där navbaren laddas in -->
    <header>
      <div id="header"></div>
    </header>

    <!-- Huvudinnehåll för sidan -->
    <main>
      <div class="product-header">
        <button id="backButton" class="back-btn">
          ← Tillbaka till produkter
        </button>
      </div>
      <div id="productDetail" class="product-detail">
        <p>Laddar produkt...</p>
      </div>
      <div id="reviewsContainer"></div>
      <div id="reviewFormContainer">
        <h3>Skriv en review</h3>

        <select id="rating">
          <option value="5">★★★★★</option>
          <option value="4">★★★★☆</option>
          <option value="3">★★★☆☆</option>
          <option value="2">★★☆☆☆</option>
          <option value="1">★☆☆☆☆</option>
        </select>

        <textarea id="comment" placeholder="Skriv din review"></textarea>
        <button id="submitReview">Skicka</button>
      </div>
      <div id="cartToast" class="cart-toast"></div>
    </main>

    <!-- Footer laddas in här -->
    <footer>
      <div id="footer"></div>
    </footer>

    <!-- Script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/navbar.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/product-spec.js"></script>
  </body>
</html>
