<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel - Users</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Optional custom CSS -->
    <link rel="stylesheet" href="/assets/css/auth.css" />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3 mb-4">
      <span class="navbar-brand">
        <i class="bi bi-people me-2"></i>Admin Panel - Users
      </span>
    </nav>

    <main class="container">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="./admin.html">Dashboard</a></li>
          <li class="breadcrumb-item active" aria-current="page">Users</li>
        </ol>
      </nav>
      <!-- Page Title -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Users Management</h1>
        <button class="btn btn-success" id="refresh-btn">
          <i class="bi bi-arrow-clockwise me-1"></i> Refresh
        </button>
      </div>

      <!-- Users Table -->
      <div class="card shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table
              class="table table-striped table-hover mb-0"
              id="users-table"
            >
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- users will be displayed here -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your JS -->
    <script src="/assets/js/admin-users.js"></script>

    <script>
      // Refresh button functionality
      document.getElementById("refresh-btn")?.addEventListener("click", () => {
        location.reload();
      });
    </script>
  </body>
</html>
