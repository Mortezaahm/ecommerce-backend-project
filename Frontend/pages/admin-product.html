<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Panel - Products</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- Optional custom CSS -->
    <link rel="stylesheet" href="/assets/css/auth.css" />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3 mb-4">
      <span class="navbar-brand">
        <i class="bi bi-box-seam me-2"></i>Admin Panel - Products
      </span>
    </nav>

    <main class="container">
      <!-- Page Title -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3">Products Management</h1>
        <button class="btn btn-success" id="refresh-btn">
          <i class="bi bi-arrow-clockwise me-1"></i> Refresh
        </button>
      </div>

      <!-- Products Table -->
      <div class="card shadow-sm mb-4">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table
              class="table table-striped table-hover mb-0"
              id="products-table"
            >
              <thead class="table-dark">
                <tr>
                  <th>ID</th>
                  <th>Title</th>
                  <th>Price</th>
                  <th>In Stock</th>
                  <th>Category</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <!-- Products will be populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Add New Product Form -->
      <div class="card shadow-sm mb-5">
        <div class="card-body">
          <h5 class="card-title mb-3">Add New Product</h5>
          <form id="add-product-form" class="row g-3">
            <div class="col-md-3">
              <input
                type="text"
                id="title"
                class="form-control"
                placeholder="Title"
                required
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                id="price"
                class="form-control"
                placeholder="Price"
                required
              />
            </div>
            <div class="col-md-2">
              <select id="in_stock" class="form-select">
                <option value="true">In Stock</option>
                <option value="false">Out of Stock</option>
              </select>
            </div>
            <div class="col-md-3">
              <input
                type="text"
                id="category"
                class="form-control"
                placeholder="Category"
                required
              />
            </div>
            <div class="col-md-2 d-grid">
              <button type="submit" class="btn btn-primary">Add Product</button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Your JS -->
    <script src="/assets/js/admin-products.js"></script>

    <script>
      // Refresh button
      document.getElementById("refresh-btn")?.addEventListener("click", () => {
        location.reload();
      });
    </script>
  </body>
</html>
