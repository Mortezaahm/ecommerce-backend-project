<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand"
        ><i class="bi bi-speedometer2 me-2"></i>Admin Panel</span
      >
    </nav>

    <main class="container py-5">
      <!-- Breadcrumb -->
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item active" aria-current="page">Dashboard</li>
        </ol>
      </nav>

      <!-- Title -->
      <div class="mb-4">
        <h2 class="fw-bold">Dashboard</h2>
        <p class="text-muted">Manage your application</p>
      </div>

      <!-- Cards -->
      <div class="row g-4">
        <!-- Users -->
        <div class="col-md-6 col-lg-3">
          <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title"><i class="bi bi-people me-2"></i>Users</h5>
              <p class="card-text text-muted">Manage all registered users.</p>
              <a href="./admin-users.html" class="btn btn-primary mt-auto">
                Go to Users
              </a>
            </div>
          </div>
        </div>

        <!-- Products -->
        <div class="col-md-6 col-lg-3">
          <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">
                <i class="bi bi-box-seam me-2"></i>Products
              </h5>
              <p class="card-text text-muted">Manage all products.</p>
              <a href="./admin-product.html" class="btn btn-success mt-auto">
                Go to Products
              </a>
            </div>
          </div>
        </div>

        <!-- Categories -->
        <div class="col-md-6 col-lg-3">
          <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">
                <i class="bi bi-tags me-2"></i>Categories
              </h5>
              <p class="card-text text-muted">Manage product categories.</p>
              <a href="./admin-category.html" class="btn btn-warning mt-auto">
                Go to Categories
              </a>
            </div>
          </div>
        </div>

        <!-- Orders -->
        <div class="col-md-6 col-lg-3">
          <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">
                <i class="bi bi-receipt me-2"></i>Orders
              </h5>
              <p class="card-text text-muted">View and manage orders.</p>
              <a href="./admin-orders.html" class="btn btn-dark mt-auto">
                Go to Orders
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
