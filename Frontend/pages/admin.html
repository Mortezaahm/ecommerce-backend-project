<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>

  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-speedometer2 me-2"></i>Admin Panel
      </span>
    </nav>

    <div class="container py-5">
      <!-- Title -->
      <div class="mb-4">
        <h2 class="fw-bold">Dashboard</h2>
        <p class="text-muted">Manage your application</p>
      </div>

      <!-- Cards -->
      <div class="row g-4">
        <!-- Users Card -->
        <div class="col-md-6">
          <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title"><i class="bi bi-people me-2"></i>Users</h5>
              <p class="card-text text-muted">
                Manage all registered users in the system.
              </p>

              <a href="./admin-users.html" class="btn btn-primary mt-auto">
                Go to Users
              </a>
            </div>
          </div>
        </div>

        <!-- Products Card -->
        <div class="col-md-6">
          <div class="card shadow-sm h-100">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title">
                <i class="bi bi-box-seam me-2"></i>Products
              </h5>
              <p class="card-text text-muted">Add, edit or remove products.</p>

              <a href="./admin-product.html" class="btn btn-success mt-auto">
                Go to Products
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
